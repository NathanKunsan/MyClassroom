<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../img/logo.png">
    <title>ตั้งรหัสผ่านใหม่ - MyClassroom</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/guard.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/protect.js"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/skeleton.css">
    <script src="../js/loader.js"></script>
</head>
<body style="justify-content: center;">
    <div class="auth-card" style="justify-content: space-between; min-height: 400px;">
        <div>
            <h1 class="auth-title">ตั้งรหัสผ่านใหม่</h1>
            <p class="auth-subtitle">กรุณากำหนดรหัสผ่านใหม่สำหรับบัญชีของคุณ</p>

            <form id="updatePasswordForm">
                <!-- ซ่อน email ไว้ให้เบราว์เซอร์ (Google Chrome) รู้จักเพื่อกด Save Password ได้ถูกต้อง -->
                <input type="email" id="hiddenEmail" name="username" autocomplete="username" style="display: none;">

                <div id="updatePassMsg" class="auth-error-msg" style="display: none; margin-bottom: 1rem; text-align: center; font-size: 0.9rem; padding: 0.75rem; border-radius: 8px;"></div>
                
                <div class="form-group">
                    <div class="form-label-row">
                        <label for="password">รหัสผ่านใหม่</label>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" id="password" autocomplete="new-password" placeholder="ตั้งรหัสผ่านของคุณ" required>
                        <button type="button" class="password-toggle" tabindex="-1">
                            <i class="ph ph-eye-slash"></i>
                        </button>
                    </div>
                    <div class="password-strength-meter">
                        <div class="strength-bar"></div>
                    </div>
                    <div class="helper-text">รหัสผ่านต้องมี 8 ตัวอักษรขึ้นไป ประกอบด้วยตัวพิมพ์เล็ก พิมพ์ใหญ่ และตัวเลข</div>
                </div>

                <div class="form-group" style="margin-bottom: 2rem;">
                    <div class="form-label-row">
                        <label for="confirmNewPassword">ยืนยันรหัสผ่านใหม่</label>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" id="confirmNewPassword" autocomplete="new-password" placeholder="กรอกรหัสผ่านอีกครั้ง" required minlength="6">
                        <button type="button" class="password-toggle" tabindex="-1">
                            <i class="ph ph-eye-slash"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="updatePassSubmitBtn" class="btn btn-primary auth-submit-btn" style="margin-top: 0;">บันทึกรหัสผ่านใหม่</button>
            </form>
        </div>

        <div>
            <div class="center-content" style="margin-top: 1.5rem;">
                <a href="../index.html" class="back-link">
                    <i class="ph ph-arrow-left"></i> กลับไปหน้าแรก
                </a>
            </div>
        </div>
    </div>
</body>
</html>
