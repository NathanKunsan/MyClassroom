<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../img/logo.png">
    <title>ลืมรหัสผ่าน - MyClassroom</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/guard.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/protect.js"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/skeleton.css">
    <script src="../js/loader.js"></script>
</head>
<body style="justify-content: center;">
    <div class="auth-card" style="justify-content: space-between; min-height: 400px;">
        <div>
            <h1 class="auth-title">ลืมรหัสผ่าน</h1>
            <p class="auth-subtitle">กรุณากรอก Email ของคุณ<br>ระบบจะส่งลิงก์สำหรับตั้งรหัสผ่านใหม่ไปให้</p>

            <form id="forgotPasswordForm">
                <div id="forgotPassMsg" class="auth-error-msg" style="display: none; margin-bottom: 1rem; text-align: center; font-size: 0.9rem; padding: 0.75rem; border-radius: 8px;"></div>
                
                <div class="form-group" style="margin-bottom: 2rem;">
                    <div class="form-label-row">
                        <label for="email">Email ของคุณครู</label>
                    </div>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="example@gmail.com" required>
                    </div>
                </div>

                <button type="submit" id="forgotPassSubmitBtn" class="btn btn-primary auth-submit-btn" style="margin-top: 0;">ยืนยัน Email</button>
            </form>
        </div>

        <div>
            <div class="auth-footer">
                จำรหัสผ่านได้? <a href="login.html">เข้าสู่ระบบ</a>
            </div>

            <div class="center-content">
                <a href="../index.html" class="back-link">
                    <i class="ph ph-arrow-left"></i> ย้อนกลับไปหน้าแรก
                </a>
            </div>
        </div>
    </div>
</body>
</html>
