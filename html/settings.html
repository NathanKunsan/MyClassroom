<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../img/logo.png">
    <title>การตั้งค่า - MyClassroom</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/style.css?v=2">
    <link rel="stylesheet" href="../css/settings.css">
    <script src="../js/loader.js"></script>
    <!-- Cropper.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
</head>

<body class="settings-page">

    <!-- Hidden Sticky Nav -->
    <nav class="settings-sticky-nav" id="settingsStickyNav">
        <div class="nav-content">
            <a href="dashboard.html" class="back-btn"><i class="ph ph-arrow-left"></i> ย้อนกลับ</a>
            <h1 class="settings-title-small">การตั้งค่า</h1>
            <button class="btn-save btn-save-small" id="stickySaveSettingsBtn">บันทึก</button>
        </div>
    </nav>

    <header class="settings-header" id="mainSettingsHeader">
        <a href="dashboard.html" class="back-btn"><i class="ph ph-arrow-left"></i> ย้อนกลับ</a>
        <h1 class="settings-title">การตั้งค่า</h1>
        <button class="btn-save" id="saveSettingsBtn">บันทึก</button>
    </header>

    <main class="settings-main">
        <div class="settings-card">
            <!-- Header of card -->

            <div class="card-header">
                <i class="ph ph-user"></i>
                <h2>ข้อมูลส่วนตัว</h2>
            </div>
            
            <div class="card-content-flex">
                <div class="form-section">
                    <div class="form-group">
                        <label>ชื่อ-นามสกุล</label>
                        <input type="text" id="settingsFullName" placeholder="[usernames]">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>ชื่อเล่น</label>
                            <input type="text" id="settingsNickname" placeholder="เช่น นาธาร">
                        </div>
                        <div class="form-group">
                            <label>เบอร์โทรศัพท์ <span class="required">*จำเป็น*</span></label>
                            <input type="tel" id="settingsPhone" placeholder="[เบอร์โทรฯ]">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="settingsEmail" placeholder="[Email ที่ใช้กรอกตั้งแต่ตอนแรก (แก้ไขไม่ได้)]" disabled>
                    </div>
                </div>
                
                <div class="profile-image-section">
                    <div class="profile-image-container" id="changeProfileBtn">
                        <img src="https://ui-avatars.com/api/?name=ครู&background=fff&color=B48ED6" alt="Profile" id="userProfileImg">
                        <div class="profile-image-overlay">
                            <span>แก้ไข</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- School Information Section -->
            <hr style="margin: 3.5rem 0; border: 0; border-top: 1px solid var(--border-color);">
            
            <div class="card-header" style="margin-bottom: 2rem;">
                <i class="ph ph-buildings"></i>
                <h2>ข้อมูลโรงเรียน</h2>
            </div>
            
            <div class="form-section">
                <div class="form-group" style="position: relative;">
                    <label style="color: var(--text-sub); font-size: 0.95rem;">ชื่อโรงเรียน</label>
                    <input type="text" id="settingsSchoolName" placeholder="พิมพ์เพื่อค้นหาชื่อโรงเรียน..." autocomplete="off">
                    <div id="schoolAutocompleteResults" class="autocomplete-dropdown"></div>
                </div>
                <div class="form-group">
                    <label style="color: var(--text-sub); font-size: 0.95rem;">เขตพื้นที่การศึกษา</label>
                    <input type="text" id="settingsSchoolArea" placeholder="เขตพื้นที่การศึกษา (อัตโนมัติ)">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label style="color: var(--text-sub); font-size: 0.95rem;">ตำบล/แขวง</label>
                        <input type="text" id="settingsSchoolSubdistrict" placeholder="ตำบล (อัตโนมัติ)">
                    </div>
                    <div class="form-group">
                        <label style="color: var(--text-sub); font-size: 0.95rem;">อำเภอ/เขต</label>
                        <input type="text" id="settingsSchoolDistrict" placeholder="อำเภอ (อัตโนมัติ)">
                    </div>
                </div>
                <div class="form-group">
                    <label style="color: var(--text-sub); font-size: 0.95rem;">จังหวัด</label>
                    <input type="text" id="settingsSchoolProvince" placeholder="จังหวัด (อัตโนมัติ)">
                </div>
            </div>
        </div>
    </main>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/guard.js"></script>

    <script src="../js/auth.js"></script>
    <script src="../js/protect.js"></script>
    
    <!-- Cropper.js JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="../js/profile.js?v=2"></script>
    <script src="../js/settings.js"></script>

    <!-- Hidden File Input for Profile Image -->
    <input type="file" id="profileImageInput" accept="image/*" style="display: none;">
</body>

</html>
